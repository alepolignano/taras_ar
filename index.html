<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>AR Finder</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        .ui { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; 
             background: rgba(0,0,0,0.8); color: white; padding: 15px; width: 90%; border-radius: 10px; font-family: sans-serif; }
        button { width: 100%; padding: 10px; margin-top: 5px; background: #00d1b2; border: none; color: white; font-weight: bold; }
        #debug { font-size: 10px; color: #00ff00; margin-top: 10px; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui">
        <input type="file" id="fileInput" accept=".glb" style="width:100%">
        <button onclick="dropAtFeet()">DROP 5m IN FRONT OF ME</button>
        <div id="debug">Waiting for GPS...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" vr-mode-ui="enabled: false">
        <a-assets id="assets"></a-assets>
        
        <a-entity id="anchor" scale="1 1 1" visible="false"></a-entity>

        <a-camera id="camera" gps-camera="gpsMinDistance: 1;" rotation-reader far="10000"></a-camera>
    </a-scene>

    <script>
        const anchor = document.getElementById('anchor');
        const debug = document.getElementById('debug');
        let userLat, userLng;

        // Get current GPS constantly
        navigator.geolocation.watchPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            
            const dist = anchor.getAttribute('distance');
            debug.innerText = `User: ${userLat.toFixed(5)}, ${userLng.toFixed(5)} | Dist: ${dist ? Math.round(dist) + 'm' : 'Not Set'}`;
        });

        function dropAtFeet() {
            if (!userLat) { alert("Still getting GPS fix..."); return; }

            // Place model 0.00005 degrees (~5 meters) north of user
            const targetLat = userLat + 0.00005; 
            const targetLng = userLng;

            anchor.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLng};`);
            
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                anchor.setAttribute('gltf-model', URL.createObjectURL(file));
            } else {
                // Red box fallback so we can at least see IF the system works
                anchor.setAttribute('geometry', 'primitive: box; height: 2; width: 2; depth: 2');
                anchor.setAttribute('material', 'color: red');
            }
            
            anchor.setAttribute('visible', 'true');
            alert(`Dropped at: ${targetLat.toFixed(5)}, ${targetLng.toFixed(5)}`);
        }
    </script>
</body>
</html>
