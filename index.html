<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>30m Tower AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; }

        #webcam {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        a-scene {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 12px;
            width: 90%; max-width: 400px; color: white; font-size: 12px;
        }

        button {
            width: 100%; padding: 12px; background: #fbbf24;
            border: none; font-weight: bold; border-radius: 5px; margin: 5px 0; cursor: pointer;
        }

        .slider-group { margin: 8px 0; }
        input[type=range] { width: 100%; }
    </style>
</head>
<body>

    <!-- Layer 0: raw webcam -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- Layer 1: A-Frame with transparent background -->
    <a-scene
        renderer="alpha: true; antialias: true"
        background="color: transparent"
        embedded
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera look-controls="enabled: true" wasd-controls="enabled: false" position="0 0 0">
            <!-- Tower locked 20 units ahead of camera for geometry test -->
            <a-entity position="0 -3 -20">

                <a-box
                    position="0 0.75 0"
                    width="4" height="1.5" depth="4"
                    material="color: #FFD700; metalness: 0.9; roughness: 0.1">
                </a-box>

                <a-cylinder
                    position="0 15.75 0"
                    radius="1.2" height="27"
                    material="color: #FFD700; metalness: 0.9; roughness: 0.1">
                </a-cylinder>

                <a-cone
                    position="0 29.25 0"
                    radius-bottom="1.2" radius-top="0.05" height="1.5"
                    material="color: #FFF176; metalness: 1.0; roughness: 0.05">
                </a-cone>

            </a-entity>
        </a-camera>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 10 1" intensity="1.5"></a-light>
    </a-scene>

    <!-- Layer 2: UI -->
    <div id="overlay" class="setup-screen">
        <h2>30m Golden Tower AR</h2>
        <p style="padding: 20px;">Allow camera &amp; GPS, then tap Start.</p>
        <button onclick="initAR()">START AR SYSTEM</button>
    </div>

    <div id="controls" class="controls" style="display:none;">
        <div id="debug">GPS: searching...</div>
        <div style="color:#fbbf24; margin:6px 0; font-size:13px;">GEOMETRY TEST — tower locked to camera</div>

        <div class="slider-group">
            <label>Vertical Offset: <span id="vVal">0</span></label>
            <input type="range" id="vOffset" min="-15" max="15" value="0" oninput="updateVisuals()">
        </div>
    </div>

    <script>
        async function initAR() {
            // Start webcam
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                document.getElementById('webcam').srcObject = stream;
            } catch (e) {
                alert('Camera error: ' + e.message);
                return;
            }

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('controls').style.display = 'block';

            // GPS (kept for later use)
            navigator.geolocation.watchPosition(pos => {
                document.getElementById('debug').innerText =
                    `GPS: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
            }, () => {
                document.getElementById('debug').innerText = 'GPS: permission denied';
            }, { enableHighAccuracy: true });
        }

        function updateVisuals() {
            const v = parseFloat(document.getElementById('vOffset').value);
            document.getElementById('vVal').innerText = v;
            document.querySelector('a-camera > a-entity').setAttribute('position', `0 ${-3 + v} -20`);
        }
    </script>
</body>
</html>
