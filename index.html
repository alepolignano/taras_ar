<!DOCTYPE html>
<html>
<head>
    <title>AR Test - Red Box</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #debug-ui {
            position: fixed; top: 10px; left: 10px; z-index: 9999;
            background: rgba(0,0,0,0.8); color: #00ff00;
            padding: 10px; font-family: monospace; font-size: 12px;
            pointer-events: none; border-radius: 5px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="debug-ui">
        Status: <span id="status">Scanning for Hiro Marker...</span>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_camera;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;">
        
        <a-marker preset="hiro" id="hiro-marker">
            <a-box position="0 0.25 0" scale="0.5 0.5 0.5" material="color: red; opacity: 0.8;"></a-box>
            <a-text value="BOX DETECTED" align="center" rotation="-90 0 0" position="0 0.1 0.6" color="yellow" width="3"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#hiro-marker');
        const status = document.querySelector('#status');

        marker.addEventListener('markerFound', () => {
            status.innerText = "MARKER FOUND!";
            status.style.color = "#fbbf24";
            console.log("Hiro Marker Found");
        });

        marker.addEventListener('markerLost', () => {
            status.innerText = "MARKER LOST - Scan again";
            status.style.color = "#ff0000";
        });
    </script>
</body>
</html>
