<!DOCTYPE html>
<html>
<head>
    <title>15m Statue - Custom Upload</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.9); color: white;
            padding: 15px; border-radius: 12px; font-family: sans-serif; 
            text-align: center; width: 300px; border: 1px solid #fbbf24;
        }
        #status { font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .controls { display: flex; flex-direction: column; gap: 8px; }
        input[type="file"] { font-size: 12px; color: #ccc; }
        button {
            padding: 10px; background: #fbbf24; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        #recenterBtn { background: #444; color: white; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div id="status">1. Upload GLB Model</div>
        <div class="controls">
            <input type="file" id="fileInput" accept=".glb">
            <div id="step2" style="display:none;">
                <p style="font-size: 11px; margin: 5px 0;">2. Show Hiro Marker to Place</p>
                <button id="recenterBtn" onclick="resetStatue()">RE-LOCK POSITION</button>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets id="assets-list"></a-assets>

        <a-marker preset="hiro" id="marker">
            <a-box opacity="0.4" color="#fbbf24" scale="0.5 0.5 0.5"></a-box>
        </a-marker>

        <a-entity id="world-statue" visible="false">
            <a-entity id="model-container" scale="15 15 15"></a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const fileInput = document.getElementById('fileInput');
        const modelContainer = document.getElementById('model-container');
        const statue = document.querySelector('#world-statue');
        const marker = document.querySelector('#marker');
        const status = document.getElementById('status');
        const step2 = document.getElementById('step2');
        
        let locked = false;

        // ─── FILE UPLOAD LOGIC ───
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const contents = event.target.result;
                const blob = new Blob([contents], {type: 'model/gltf-binary'});
                const url = URL.createObjectURL(blob);

                // Set the model to the container
                modelContainer.setAttribute('gltf-model', url);
                
                status.innerText = "Model Loaded!";
                status.style.color = "#fbbf24";
                step2.style.display = "block";
                fileInput.style.display = "none";
            };
            reader.readAsArrayBuffer(file);
        });

        // ─── WORLD LOCK LOGIC ───
        // Uses the 3D position of the marker to "drop" the model in global space
        marker.addEventListener('markerFound', () => {
            if (!locked && modelContainer.hasAttribute('gltf-model')) {
                const worldPos = new THREE.Vector3();
                marker.object3D.getWorldPosition(worldPos);
                
                const worldQuat = new THREE.Quaternion();
                marker.object3D.getWorldQuaternion(worldQuat);

                statue.object3D.position.copy(worldPos);
                statue.object3D.quaternion.copy(worldQuat);
                
                statue.setAttribute('visible', 'true');
                locked = true;
                status.innerText = "Statue Locked in World";
            }
        });

        function resetStatue() {
            locked = false;
            statue.setAttribute('visible', 'false');
            status.innerText = "Scanning for Marker...";
        }
    </script>
</body>
</html>
