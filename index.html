<!DOCTYPE html>
<html>
  <head>
    <title>Fixed GLB Tower</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        background: rgba(0,0,0,0.8); color: gold; padding: 15px;
        border-radius: 10px; font-family: sans-serif; border: 1px solid gold;
      }
      input { display: block; margin: 5px 0; width: 180px; }
      button { width: 100%; padding: 10px; background: gold; font-weight: bold; margin-top: 5px; cursor: pointer; border: none; }
      .hint { font-size: 10px; color: white; margin-top: 5px; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div class="ui">
      GLB URL: <input type="text" id="glbUrl" placeholder="https://path-to-your.glb">
      LAT: <input type="number" id="lat" step="0.000001" placeholder="Latitude">
      LON: <input type="number" id="lon" step="0.000001" placeholder="Longitude">
      <button onclick="loadModel()">SPAWN MODEL</button>
      <div class="hint">Wait for GPS accuracy < 10m for best results.</div>
      <div id="status" style="font-size: 11px; color: #0f0;"></div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-assets id="assets-list"></a-assets>
      
      <a-camera gps-camera="minDistance: 10; simulateAltitude: 0;" rotation-reader></a-camera>
    </a-scene>

    <script>
      // Track GPS accuracy for the user
      window.addEventListener('gps-camera-update-position', (e) => {
        document.getElementById('status').innerText = `Accuracy: ${e.detail.position.accuracy.toFixed(1)}m`;
      });

      function loadModel() {
        const url = document.getElementById('glbUrl').value;
        const lat = document.getElementById('lat').value;
        const lon = document.getElementById('lon').value;
        const scene = document.querySelector('a-scene');
        const assets = document.querySelector('#assets-list');

        if(!url || !lat || !lon) return alert("Fill all fields!");

        // 1. Setup Asset
        const assetId = "user-model";
        let asset = document.getElementById(assetId);
        if (asset) asset.remove();
        
        asset = document.createElement('a-asset-item');
        asset.setAttribute('id', assetId);
        asset.setAttribute('src', url);
        assets.appendChild(asset);

        // 2. Setup Entity
        let model = document.querySelector('#tower-entity');
        if (model) model.remove();

        model = document.createElement('a-entity');
        model.setAttribute('id', 'tower-entity');
        model.setAttribute('gltf-model', `#${assetId}`);
        
        // Scale/Position: Ensure it's 70m tall. 
        // If your original model is 1m tall, scale="70 70 70"
        model.setAttribute('scale', '1 1 1'); 
        
        // Anchor to GPS
        model.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
        
        scene.appendChild(model);
      }
    </script>
  </body>
</html>
