<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); color: white; padding: 10px;
            font-family: sans-serif; border-radius: 8px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        Status: <span id="status">Scanning for marker...</span><br>
        <small>Point camera at the marker image</small>
    </div>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist-targets/course-banner.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="zeus-model" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-entity id="statue" 
                  gltf-model="#zeus-model" 
                  scale="0.5 0.5 0.5" 
                  position="0 0 0"
                  rotation="0 0 0">
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
        const status = document.getElementById('status');
        const target = document.getElementById('target');

        // Detect when marker is found
        target.addEventListener("targetFound", event => {
            status.innerText = "Target Found! Statue Locked.";
            status.style.color = "#fbbf24";
        });

        // Detect when marker is lost
        target.addEventListener("targetLost", event => {
            status.innerText = "Target Lost. Statue may jitter.";
            status.style.color = "red";
        });
    </script>
</body>
</html>
