<!DOCTYPE html>
<html>
  <head>
    <title>AR.js Golden Tower</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
      window.onload = () => {
        navigator.geolocation.getCurrentPosition((position) => {
          const scene = document.querySelector('a-scene');
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          // Create the Golden Tower
          const tower = document.createElement('a-cylinder');
          tower.setAttribute('material', 'color: #FFD700; metalness: 0.8; roughness: 0.2');
          tower.setAttribute('height', '70');
          tower.setAttribute('radius', '2');
          
          // Place it 20m North of current position 
          // (Roughly 0.00018 degrees lat change = 20m)
          tower.setAttribute('gps-entity-place', `latitude: ${lat + 0.00018}; longitude: ${lon};`);
          
          // Elevate so the base is at ground level (height/2)
          tower.setAttribute('position', '0 35 0');

          scene.appendChild(tower);
        });
      };
    </script>
  </body>
</html>
