<!DOCTYPE html>
<html>
<head>
    <title>15m Statue AR Feed</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 12px; width: 90%; max-width: 350px;
        }
        .control-group { margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        .control-group label { font-size: 10px; width: 60px; color: #fbbf24; font-weight: bold; }
        input[type="range"] { flex: 1; accent-color: #fbbf24; }
        input[type="file"] { font-size: 11px; margin-bottom: 10px; }
        button {
            width: 100%; padding: 10px; background: #fbbf24; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        #status { font-size: 12px; text-align: center; margin-bottom: 8px; }
    </style>
</head>

<body>

    <div id="ui">
        <div id="status">STEP 1: UPLOAD .GLB MODEL</div>
        <input type="file" id="fileInput" accept=".glb">
        
        <div id="adjustments" style="display:none;">
            <div class="control-group">
                <label>ROTATION</label>
                <input type="range" id="rotSlider" min="0" max="360" value="0">
            </div>
            <div class="control-group">
                <label>HEIGHT (Y)</label>
                <input type="range" id="heightSlider" min="-5" max="20" step="0.1" value="0">
            </div>
            <button onclick="resetAnchor()">RESET ANCHOR</button>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        
        <a-assets id="assets"></a-assets>

        <a-marker preset="hiro" id="hiro-marker">
            <a-ring color="#fbbf24" rotation="-90 0 0" radius-inner="0.4" radius-outer="0.5"></a-ring>
        </a-marker>

        <a-entity id="world-anchor" visible="false">
            <a-entity id="statue-node" scale="15 15 15" position="0 0 0"></a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const fileInput = document.getElementById('fileInput');
        const statueNode = document.getElementById('statue-node');
        const worldAnchor = document.getElementById('world-anchor');
        const hiroMarker = document.getElementById('hiro-marker');
        const status = document.getElementById('status');
        const adjustments = document.getElementById('adjustments');

        let anchored = false;

        // 1. Upload logic
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            statueNode.setAttribute('gltf-model', url);
            
            status.innerText = "MODEL READY: SCAN HIRO MARKER";
            fileInput.style.display = "none";
            adjustments.style.display = "block";
        });

        // 2. The "World Lock" Hand-off
        hiroMarker.addEventListener('markerFound', () => {
            if (!anchored && statueNode.hasAttribute('gltf-model')) {
                const worldPos = new THREE.Vector3();
                hiroMarker.object3D.getWorldPosition(worldPos);
                
                const worldQuat = new THREE.Quaternion();
                hiroMarker.object3D.getWorldQuaternion(worldQuat);

                worldAnchor.object3D.position.copy(worldPos);
                worldAnchor.object3D.quaternion.copy(worldQuat);
                
                worldAnchor.setAttribute('visible', 'true');
                anchored = true;
                status.innerText = "STATUE ANCHORED TO CAMERA FEED";
            }
        });

        // 3. Real-time Sliders
        document.getElementById('rotSlider').addEventListener('input', (e) => {
            statueNode.setAttribute('rotation', `0 ${e.target.value} 0`);
        });

        document.getElementById('heightSlider').addEventListener('input', (e) => {
            const pos = statueNode.getAttribute('position');
            pos.y = parseFloat(e.target.value);
            statueNode.setAttribute('position', pos);
        });

        function resetAnchor() {
            anchored = false;
            worldAnchor.setAttribute('visible', 'false');
            status.innerText = "SCAN HIRO MARKER";
        }
    </script>
</body>
</html>
