<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: sans-serif; }

        #overlay {
            position: fixed; inset: 0;
            background: #111; z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 20px;
        }
        #overlay h2 { font-size: 1.4rem; margin-bottom: 12px; }
        #overlay p  { font-size: 0.9rem; opacity: 0.7; margin-bottom: 24px; }

        #hud {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            padding: 12px 16px; border-radius: 14px;
            color: #fff; font-size: 12px; width: 90%; max-width: 380px;
            display: none;
        }
        #hud #debug { margin-bottom: 8px; opacity: 0.8; }

        button {
            width: 100%; padding: 13px; background: #fbbf24;
            border: none; font-weight: 700; border-radius: 8px;
            margin: 4px 0; cursor: pointer; font-size: 14px;
        }
        button:disabled { opacity: 0.4; cursor: default; }

        .a-enter-vr, .a-orientation-modal { display: none !important; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>Zeus AR</h2>
    <p>Tap Start to allow camera, GPS and compass.</p>
    <button id="startBtn" onclick="startAR()">START</button>
</div>

<div id="hud">
    <div id="debug">GPS: searching…</div>
    <button id="dropBtn" onclick="dropTower()" disabled>PLACE ZEUS HERE</button>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    id="scene">

    <a-assets>
        <a-asset-item id="zeus-model" src="zeus.glb"></a-asset-item>
    </a-assets>

    <a-camera id="cam" gps-camera rotation-reader></a-camera>

    <a-light type="ambient"     intensity="1.5"></a-light>
    <a-light type="directional" position="1 10 1" intensity="1.2"></a-light>
</a-scene>

<script>
const ALPHA = 0.2;
let smoothLat = null, smoothLng = null;
let deployed  = false;

function smoothGPS(lat, lng) {
    if (smoothLat === null) { smoothLat = lat; smoothLng = lng; return; }
    smoothLat = ALPHA * lat + (1 - ALPHA) * smoothLat;
    smoothLng = ALPHA * lng + (1 - ALPHA) * smoothLng;
}

async function startAR() {
    // iOS 13+ requires an explicit user-gesture permission for the compass.
    // Without this the camera never rotates and everything appears to follow you.
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const perm = await DeviceOrientationEvent.requestPermission();
            if (perm !== 'granted') {
                alert('Compass permission is required for AR anchoring.');
                return;
            }
        } catch (e) {
            console.warn('DeviceOrientation permission error:', e);
        }
    }

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hud').style.display     = 'block';

    navigator.geolocation.watchPosition(
        pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            smoothGPS(lat, lng);
            document.getElementById('debug').textContent =
                `GPS: ${smoothLat.toFixed(5)}, ${smoothLng.toFixed(5)}  ±${Math.round(accuracy)}m`;
            document.getElementById('dropBtn').disabled = false;
        },
        err => {
            document.getElementById('debug').textContent = 'GPS error: ' + err.message;
        },
        { enableHighAccuracy: true, maximumAge: 0 }
    );
}

function dropTower() {
    if (smoothLat === null) return;

    const old = document.getElementById('tower-anchor');
    if (old) old.remove();
    deployed = true;

    // 20 m north (1 deg lat ≈ 111 320 m → 20 m ≈ 0.00018 deg)
    const lat = smoothLat + 0.00018;
    const lng = smoothLng;

    // Inject as HTML string — same pattern as the working React app
    document.getElementById('scene').insertAdjacentHTML('beforeend', `
        <a-entity id="tower-anchor" gps-entity-place="latitude: ${lat}; longitude: ${lng};">
            <a-entity gltf-model="#zeus-model" scale="30 30 30" position="0 0 0"></a-entity>
        </a-entity>
    `);

    document.getElementById('debug').textContent =
        `Zeus at ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}
</script>

</body>
</html>
