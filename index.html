<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: sans-serif; }

        #overlay {
            position: fixed; inset: 0;
            background: #111; z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 20px;
        }
        #overlay h2 { font-size: 1.4rem; margin-bottom: 12px; }
        #overlay p  { font-size: 0.9rem; opacity: 0.7; margin-bottom: 24px; }

        #hud {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            padding: 12px 16px; border-radius: 14px;
            color: #fff; font-size: 12px; width: 90%; max-width: 380px;
            display: none;
        }
        #hud #debug { margin-bottom: 8px; opacity: 0.8; }

        button {
            width: 100%; padding: 13px; background: #fbbf24;
            border: none; font-weight: 700; border-radius: 8px;
            margin: 4px 0; cursor: pointer; font-size: 14px;
        }
        button:disabled { opacity: 0.4; cursor: default; }

        .a-enter-vr, .a-orientation-modal { display: none !important; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>30m Golden Tower AR</h2>
    <p>Point your camera at the ground ahead,<br>then tap Start.</p>
    <button id="startBtn" onclick="startAR()">START</button>
</div>

<div id="hud">
    <div id="debug">GPS: searching…</div>
    <button id="dropBtn" onclick="dropTower()" disabled>DROP TOWER HERE</button>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: false; debugUIEnabled: false;"
    id="scene">

    <a-assets>
        <a-asset-item id="zeus-model" src="zeus.glb"></a-asset-item>
    </a-assets>

    <!-- gpsMinDistance: don't reposition camera more than once per 3 m move
         positionMinAccuracy: ignore fixes worse than 100 m -->
    <a-camera
        id="cam"
        gps-camera="gpsMinDistance: 3; positionMinAccuracy: 100;"
        rotation-reader>
    </a-camera>

    <a-light type="ambient"     intensity="1.5"></a-light>
    <a-light type="directional" position="1 10 1" intensity="1.2"></a-light>
</a-scene>

<script>
// ── GPS smoothing ────────────────────────────────────────────────────────────
// Exponential moving average keeps the placed coordinate stable.
const ALPHA = 0.2;          // lower = smoother but slower to settle
let smoothLat = null, smoothLng = null;
let watchId   = null;
let deployed  = false;
let statueLat = null, statueLng = null;
let lastBuzz  = 0;

function smoothGPS(lat, lng) {
    if (smoothLat === null) { smoothLat = lat; smoothLng = lng; return; }
    smoothLat = ALPHA * lat + (1 - ALPHA) * smoothLat;
    smoothLng = ALPHA * lng + (1 - ALPHA) * smoothLng;
}

function haversineM(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.asin(Math.sqrt(a));
}

function checkProximity(userLat, userLng) {
    if (statueLat === null) return;
    const dist = haversineM(userLat, userLng, statueLat, statueLng);
    if (dist <= 1 && Date.now() - lastBuzz > 10000) {
        navigator.vibrate([200, 100, 200]);   // buzz – pause – buzz
        lastBuzz = Date.now();
    }
}

// ── AR init ──────────────────────────────────────────────────────────────────
function startAR() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hud').style.display     = 'block';

    watchId = navigator.geolocation.watchPosition(
        pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            smoothGPS(lat, lng);
            checkProximity(lat, lng);
            document.getElementById('debug').textContent =
                `GPS: ${smoothLat.toFixed(5)}, ${smoothLng.toFixed(5)}  ±${Math.round(accuracy)}m`;
            document.getElementById('dropBtn').disabled = false;
        },
        err => {
            document.getElementById('debug').textContent = 'GPS error: ' + err.message;
        },
        { enableHighAccuracy: true, maximumAge: 0 }
    );
}

// ── Tower placement ───────────────────────────────────────────────────────────
function dropTower() {
    if (smoothLat === null) return;
    if (deployed) {
        // Remove previous tower
        const old = document.getElementById('tower-anchor');
        if (old) old.parentNode.removeChild(old);
    }
    deployed = true;

    // Offset 20 m north so the statue is in front of you, not around you
    // 1 degree latitude ≈ 111 320 m  →  20 m ≈ 0.00018 deg
    const lat = smoothLat + 0.00018;
    const lng = smoothLng;

    // Store for proximity check
    statueLat = lat;
    statueLng = lng;

    const anchor = document.createElement('a-entity');
    anchor.id = 'tower-anchor';
    anchor.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);

    // ── Zeus GLB model (30 m tall) ────────────────────────
    const model = document.createElement('a-entity');
    model.setAttribute('gltf-model', '#zeus-model');
    model.setAttribute('scale',      '30 30 30');
    model.setAttribute('position',   '0 0 0');

    anchor.appendChild(model);
    document.getElementById('scene').appendChild(anchor);

    document.getElementById('debug').textContent =
        `Tower placed at ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}
</script>

</body>
</html>
