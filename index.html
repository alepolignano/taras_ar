<!DOCTYPE html>
<html>
<head>
    <title>15m Statue - Hiro Anchor</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 10px; width: 280px; text-align: center;
        }
        .slider-wrap { margin: 10px 0; display: flex; align-items: center; gap: 5px; }
        .slider-wrap label { font-size: 10px; width: 50px; color: #fbbf24; }
        input[type="range"] { flex: 1; accent-color: #fbbf24; }
        #status { font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div id="status">1. UPLOAD GLB</div>
        <input type="file" id="fileInput" accept=".glb" style="font-size: 11px;">
        
        <div id="controls" style="display:none;">
            <div class="slider-wrap">
                <label>SCALE</label>
                <input type="range" id="scaleSlider" min="0.1" max="30" step="0.1" value="1">
            </div>
            <div class="slider-wrap">
                <label>HEIGHT</label>
                <input type="range" id="heightSlider" min="-10" max="10" step="0.1" value="0">
            </div>
            <div id="status-msg" style="font-size: 10px; color: #fbbf24;">Point at Hiro Marker</div>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_camera;">
        
        <a-assets id="assets-list"></a-assets>

        <a-marker preset="hiro" id="hiro-marker">
            <a-ring color="#fbbf24" rotation="-90 0 0" radius-inner="0.4" radius-outer="0.5"></a-ring>
            
            <a-entity id="statue-container" position="0 0 0" scale="1 1 1">
                <a-entity id="statue-model"></a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const fileInput = document.getElementById('fileInput');
        const statueModel = document.getElementById('statue-model');
        const statueContainer = document.getElementById('statue-container');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');

        // 1. Handle File Upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            
            statueModel.setAttribute('gltf-model', url);
            
            status.innerText = "MODEL READY";
            fileInput.style.display = "none";
            controls.style.display = "block";
        });

        // 2. UI Adjustments
        document.getElementById('scaleSlider').addEventListener('input', (e) => {
            const s = e.target.value;
            statueContainer.setAttribute('scale', `${s} ${s} ${s}`);
        });

        document.getElementById('heightSlider').addEventListener('input', (e) => {
            const y = e.target.value;
            statueContainer.setAttribute('position', `0 ${y} 0`);
        });
    </script>
</body>
</html>
