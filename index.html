<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Firm Geo-AR Anchor v4</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        .ui-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.9); color: white;
            padding: 15px; border-radius: 15px; font-family: sans-serif; width: 90%; max-width: 380px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        input, button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; }
        button { background: #00d1b2; color: white; font-weight: bold; cursor: pointer; }
        .label { font-size: 12px; margin-bottom: 4px; color: #aaa; }
        #status { color: #ffcc00; font-weight: bold; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui-panel">
        <div class="row">
            <input type="number" id="lat" placeholder="Lat" step="any">
            <input type="number" id="lng" placeholder="Lng" step="any">
        </div>
        <div class="label">Upload .glb (1MB is perfect)</div>
        <input type="file" id="fileInput" accept=".glb" onchange="handleFileUpload()">
        
        <div class="label">Scale Adjustment</div>
        <input type="range" id="scaleRange" min="0.1" max="20" value="1" step="0.1" oninput="updateScale(this.value)">
        
        <button onclick="deploy()">DEPLOY & LOCK</button>
        <div id="status" style="margin-top:10px; text-align:center; font-size:12px;">Waiting...</div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
        vr-mode-ui="enabled: false"
    >
        <a-entity id="anchor-node"></a-entity>
        
        <a-camera 
            id="camera" 
            gps-camera="gpsMinDistance: 2; simulateAltitude: 1.6;" 
            rotation-reader>
        </a-camera>
    </a-scene>

    <script>
        const anchor = document.getElementById('anchor-node');
        const status = document.getElementById('status');
        let currentModelUrl = null;

        function handleFileUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (currentModelUrl) URL.revokeObjectURL(currentModelUrl); // Memory management
            currentModelUrl = URL.createObjectURL(file);
            status.innerText = "Model loaded. Tap Deploy.";
        }

        function updateScale(val) {
            anchor.setAttribute('scale', `${val} ${val} ${val}`);
        }

        function deploy() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lng = parseFloat(document.getElementById('lng').value);

            // 1. Force Resume Camera (fixes the 'black screen' after file pick)
            const scene = document.querySelector('a-scene');
            if (scene.systems.webcam) scene.systems.webcam.play(); 

            // 2. Clean Entity
            anchor.removeAttribute('gltf-model');
            anchor.removeAttribute('geometry');

            // 3. Set Location
            anchor.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);

            // 4. Apply Model or Default
            if (currentModelUrl) {
                anchor.setAttribute('gltf-model', currentModelUrl);
            } else {
                anchor.setAttribute('geometry', 'primitive: box; height: 5; width: 2; depth: 2');
                anchor.setAttribute('material', 'color: gold; metalness: 0.9');
            }

            status.innerText = "Anchored! Walk around to test.";
        }

        // Auto-fetch current GPS
        window.onload = () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
                document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
            });
        };

        // Listen for distance updates
        window.addEventListener('gps-camera-update-position', () => {
            const dist = anchor.getAttribute('distance');
            if (dist) status.innerText = `Distance: ${Math.round(dist)}m`;
        });
    </script>
</body>
</html>
