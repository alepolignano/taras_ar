<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Geo-AR Golden Tower</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <a-entity
        id="tower"
        geometry="primitive: cylinder; height: 10; radius: 2"
        material="color: gold; metalness: 0.8; roughness: 0.2"
        gps-entity-place="latitude: 51.5074; longitude: -0.1278;"
        scale="1 1 1"
        look-at="[gps-camera]"
      >
        <a-text
          value="GOLDEN TOWER"
          align="center"
          position="0 6 0"
          scale="5 5 5"
        ></a-text>
      </a-entity>

      <a-camera 
        gps-camera="simulateAltitude: 1.6; gpsMinDistance: 1;" 
        rotation-reader
      >
      </a-camera>
    </a-scene>
  </body>
</html>
