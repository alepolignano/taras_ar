<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeus AR - Fixed Anchor</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        #overlay {
            position: fixed; inset: 0;
            background: #111; z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 20px;
        }

        #hud {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 18px;
            color: #fff; font-size: 13px; width: 90%; max-width: 350px;
            display: none; border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            width: 100%; padding: 15px; background: #fbbf24;
            border: none; font-weight: 800; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; margin-top: 10px;
        }
        button:disabled { opacity: 0.3; }

        #debug { font-family: monospace; margin-bottom: 8px; color: #aaa; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="margin-bottom: 10px;">ZEUS AR</h2>
    <p style="margin-bottom: 20px; opacity: 0.8;">Requires Camera, GPS, and Compass.</p>
    <button onclick="startAR()">Initialize AR</button>
</div>

<div id="hud">
    <div id="debug">Waiting for GPS...</div>
    <button id="dropBtn" onclick="dropTower()" disabled>PLACE ZEUS (20m North)</button>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
    
    <a-assets>
        <a-asset-item id="zeus-model" src="zeus.glb"></a-asset-item>
    </a-assets>

    <a-camera id="cam" gps-camera="minDistance: 1; maxDistance: 1000;" rotation-reader></a-camera>

    <a-light type="ambient" intensity="1.0"></a-light>
    <a-light type="directional" position="0 10 0" intensity="1.0"></a-light>
</a-scene>

<script>
let currentLat = null;
let currentLng = null;

async function startAR() {
    // 1. Handle iOS Compass Permissions
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const response = await DeviceOrientationEvent.requestPermission();
            if (response !== 'granted') {
                alert("Compass permission denied. The model will move with you.");
            }
        } catch (e) {
            console.error(e);
        }
    }

    // 2. "Wake up" the orientation sensors
    window.dispatchEvent(new Event('deviceorientation'));
    window.dispatchEvent(new Event('compassneedscalibration'));

    // 3. UI Transition
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hud').style.display = 'block';

    // 4. Start Tracking
    navigator.geolocation.watchPosition(
        pos => {
            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;
            
            const acc = Math.round(pos.coords.accuracy);
            document.getElementById('debug').innerHTML = 
                `LAT: ${currentLat.toFixed(5)}<br>LNG: ${currentLng.toFixed(5)}<br>ACCURACY: ±${acc}m`;
            
            // Only enable button if accuracy is decent (under 50m)
            if (acc < 50) {
                document.getElementById('dropBtn').disabled = false;
            }
        },
        err => {
            document.getElementById('debug').textContent = "GPS Error: " + err.message;
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
}

function dropTower() {
    if (!currentLat || !currentLng) return;

    const existing = document.getElementById('zeus-anchor');
    if (existing) existing.remove();

    // 20 m north (1 deg lat ≈ 111 320 m → 20 m ≈ 0.00018 deg)
    const targetLat = currentLat + 0.00018;
    const targetLng = currentLng;

    // Inject as HTML string — same pattern as the working React app
    document.querySelector('a-scene').insertAdjacentHTML('beforeend', `
        <a-entity id="zeus-anchor" gps-entity-place="latitude: ${targetLat}; longitude: ${targetLng};">
            <a-entity gltf-model="#zeus-model" scale="20 20 20" rotation="0 180 0" position="0 0 0"></a-entity>
        </a-entity>
    `);

    document.getElementById('debug').textContent = `Zeus at ${targetLat.toFixed(5)}, ${targetLng.toFixed(5)}`;
}
</script>

</body>
</html>
