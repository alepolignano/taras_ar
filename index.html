<!DOCTYPE html>
<html>
  <head>
    <title>Locked 70m Tower</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        background: rgba(0, 0, 0, 0.8); color: #FFD700; padding: 15px;
        border-radius: 10px; font-family: monospace; border: 1px solid #FFD700;
      }
      input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; margin: 5px 0; width: 160px; display: block; }
      button { width: 100%; padding: 10px; background: #FFD700; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div class="ui">
      LAT: <input type="number" id="lat" step="0.000001" placeholder="40.7128">
      LON: <input type="number" id="lon" step="0.000001" placeholder="-74.0060">
      <button onclick="spawnTower()">LOCK TOWER IN PLACE</button>
      <div id="status" style="font-size: 10px; margin-top: 10px; color: white;">Waiting for GPS...</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera 
        gps-camera="gpsMinDistance: 5; simulateAltitude: 0;" 
        rotation-reader>
      </a-camera>
    </a-scene>

    <script>
      // Listen for GPS updates just to show status
      window.addEventListener('gps-camera-update-position', (e) => {
        document.getElementById('status').innerText = `Your GPS Accuracy: ${e.detail.position.accuracy.toFixed(1)}m`;
      });

      function spawnTower() {
        const lat = document.querySelector('#lat').value;
        const lon = document.querySelector('#lon').value;
        const scene = document.querySelector('a-scene');

        // Remove old tower
        const old = document.querySelector('#golden-tower');
        if (old) scene.removeChild(old);

        const tower = document.createElement('a-entity');
        tower.setAttribute('id', 'golden-tower');
        
        // Define the geometry and look
        tower.innerHTML = `
          <a-cylinder 
            height="70" 
            radius="3" 
            position="0 35 0"
            material="color: #FFD700; metalness: 0.9; roughness: 0.1; side: double">
          </a-cylinder>
        `;
        
        // The Magic Sauce: "gps-entity-place" tells it WHERE.
        // We set it once. AR.js then handles the relative position.
        tower.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
        
        scene.appendChild(tower);
        console.log("Tower anchored.");
      }
    </script>
  </body>
</html>
