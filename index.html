<!DOCTYPE html>
<html>
<head>
    <title>15m Statue - World Lock Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 10px; font-family: sans-serif; text-align: center;
        }
        button {
            margin-top: 10px; padding: 10px 20px; background: #fbbf24;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div id="status">Scan Hiro Marker to Place Statue</div>
        <button onclick="resetStatue()">RESET POSITION</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="statue-model" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-box opacity="0.5" color="#fbbf24" scale="0.2 0.2 0.2"></a-box>
        </a-marker>

        <a-entity id="world-statue" visible="false">
            <a-entity 
                gltf-model="#statue-model" 
                scale="15 15 15" 
                position="0 0 0">
            </a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const statue = document.querySelector('#world-statue');
        const status = document.querySelector('#status');
        let locked = false;

        // WORLD LOCK LOGIC
        // Every frame, if the marker is visible and we aren't "locked", 
        // move the statue to the marker's current position.
        marker.addEventListener('markerFound', () => {
            if (!locked) {
                status.innerText = "Statue Anchored to World!";
                status.style.color = "#fbbf24";
                
                // Get marker position/rotation in world space
                const worldPos = new THREE.Vector3();
                marker.object3D.getWorldPosition(worldPos);
                
                const worldQuat = new THREE.Quaternion();
                marker.object3D.getWorldQuaternion(worldQuat);

                // Teleport the statue to that exact spot
                statue.object3D.position.copy(worldPos);
                statue.object3D.quaternion.copy(worldQuat);
                
                statue.setAttribute('visible', 'true');
                locked = true; // Now it stays there regardless of the marker
            }
        });

        function resetStatue() {
            locked = false;
            statue.setAttribute('visible', 'false');
            status.innerText = "Scan Hiro Marker to Place Statue";
            status.style.color = "white";
        }
    </script>
</body>
</html>
